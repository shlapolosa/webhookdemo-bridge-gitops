apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: webhookdemo-bridge
  annotations:
    app.oam.dev/publishVersion: "067d9601404dc8c12cbc9702e943017b2d58ab2b"
  namespace: default
spec:
  components:
    - name: webhookdemo-bridge
      type: webservice
      properties:
        name: webhookdemo-bridge
        image: healthidpuaeacr.azurecr.io/webhookdemo-bridge:067d960
        language: python
        framework: fastapi
        port: 8080
        healthPath: /health
        database: postgres
        cache: redis
        # NOTE: topology policy intentionally omitted — added by oam-updater
        # when targetVCluster != "host". Host deployments need no topology policy.
        # Add your components here using the following types:
        # - microservice-with-db: Full-featured microservice with database and cache
        # - react-frontend: React TypeScript frontend with Material-UI
        # - static-site: Static website hosting
        # - kafka-service: Event streaming service
        # - data-pipeline: ETL and data processing workflows
        # 
        # Example:
        # components:
        # - name: api-backend
        #   type: microservice-with-db
        #   properties:
        #     language: python
        #     framework: fastapi
        #     database: postgres
        #     cache: redis
        #     exposeApi: true
        # - name: web-frontend
        #   type: react-frontend
        #   properties:
        #     framework: react
        #     styling: material-ui
        #     apiEndpoint: /api
# Note: Workflow orchestration is handled by KubeVela WorkflowStepDefinitions
# installed in the cluster, not embedded in the application spec.
